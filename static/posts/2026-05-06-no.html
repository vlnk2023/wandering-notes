<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="正文 在此处开始写笔记...">
<title>ni · Wandering Notes</title>
<style>

:root {
  --bg:#f7f3eb;
  --paper:#fffdf8;
  --paper-strong:#fff8eb;
  --ink:#201b16;
  --muted:#70675c;
  --quiet:#9b9184;
  --line:#e6ded0;
  --line-soft:#f0e8db;
  --accent:#0e6f6d;
  --accent-deep:#094d4b;
  --accent-soft:#dff1ec;
  --amber:#af6b1a;
  --amber-soft:#f7e8c9;
  --rose:#8b4738;
  --shadow:0 20px 60px rgba(79,55,28,.11);
  --shadow-soft:0 10px 26px rgba(79,55,28,.08);
  --radius:22px;
  --radius-md:16px;
  --radius-sm:10px;
}
*,*::before,*::after { box-sizing:border-box }
html { scroll-behavior:smooth }
body {
  margin:0;
  color:var(--ink);
  background:
    radial-gradient(circle at 8% -8%, rgba(14,111,109,.14), transparent 34rem),
    radial-gradient(circle at 88% 8%, rgba(175,107,26,.15), transparent 28rem),
    linear-gradient(180deg, #fbf6ec 0%, var(--bg) 42%, #f3eee5 100%);
  font-family:"Noto Serif SC","Source Han Serif SC","LXGW WenKai","PingFang SC","Microsoft YaHei",serif;
  font-size:16px;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.52;
  background-image:
    linear-gradient(rgba(32,27,22,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(32,27,22,.027) 1px, transparent 1px);
  background-size:34px 34px;
  mask-image:linear-gradient(180deg, rgba(0,0,0,.65), transparent 68%);
}
a { color:var(--accent); text-decoration:none; text-underline-offset:3px }
a:hover { color:var(--accent-deep); text-decoration:underline }
button,input,select { font:inherit }
.sr-only {
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}
.topbar {
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid rgba(230,222,208,.78);
  background:rgba(255,253,248,.82);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.nav {
  max-width:1120px;
  min-height:64px;
  margin:0 auto;
  padding:0 24px;
  display:flex;
  align-items:center;
  gap:16px;
}
.brand {
  flex:0 0 auto;
  color:var(--ink);
  font-size:16px;
  font-weight:800;
  letter-spacing:.01em;
}
.brand::before {
  content:"";
  display:inline-block;
  width:9px;
  height:9px;
  margin-right:9px;
  border-radius:99px;
  background:var(--accent);
  box-shadow:0 0 0 5px rgba(14,111,109,.12);
  vertical-align:1px;
}
.nav a:not(.brand) {
  color:var(--muted);
  font-size:14px;
  font-weight:700;
  text-decoration:none;
  padding:5px 0;
  border-bottom:2px solid transparent;
}
.nav a:not(.brand):hover,
.nav a.active {
  color:var(--ink);
  border-bottom-color:var(--accent);
}
.nav-search {
  flex:1 1 520px;
  max-width:560px;
  margin-left:auto;
}
.nav-search-box {
  position:relative;
}
.nav-search-box::before {
  content:"⌕";
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  color:var(--quiet);
  font-size:20px;
  z-index:1;
}
.nav-search #searchInput {
  width:100%;
  min-height:42px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,250,241,.94);
  color:var(--ink);
  outline:none;
  padding:0 76px 0 44px;
}
.nav-search #searchInput:focus {
  border-color:rgba(14,111,109,.55);
  box-shadow:0 0 0 4px rgba(14,111,109,.12);
}
.nav-search-submit {
  position:absolute;
  right:5px;
  top:5px;
  min-height:32px;
  padding:0 14px;
  border:0;
  border-radius:999px;
  background:var(--ink);
  color:#fffaf1;
  cursor:pointer;
  font-size:13px;
  font-weight:900;
}
.nav-search-submit:hover { background:var(--accent-deep) }
.wrap,
.home-shell {
  width:min(1120px, 100%);
  margin:0 auto;
  padding:0 24px;
}
.post-wrap {
  width:min(880px, 100%);
  margin:0 auto;
  padding:0 24px;
}
.post-hero {
  padding:64px 0 34px;
  text-align:center;
}
.post-hero h1 {
  max-width:780px;
  margin:0 auto 14px;
  color:var(--ink);
  font-size:clamp(30px, 5vw, 52px);
  font-weight:900;
  line-height:1.16;
  letter-spacing:-.045em;
}
.post-hero .date {
  display:block;
  color:var(--quiet);
  font-size:14px;
  margin-bottom:16px;
}
.tags {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
}
.tag,
.mini-tag,
.filter-pill {
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid rgba(14,111,109,.16);
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent-deep);
  font-size:13px;
  font-weight:700;
  line-height:1;
  text-decoration:none;
}
.tag { padding:7px 12px }
.mini-tag { padding:6px 10px }
.tag:hover,
.mini-tag:hover {
  color:var(--accent-deep);
  background:#cfe9e3;
  text-decoration:none;
}
.article {
  max-width:760px;
  margin:0 auto 56px;
  padding:32px clamp(20px, 4vw, 42px);
  border:1px solid rgba(230,222,208,.9);
  border-radius:var(--radius);
  background:rgba(255,253,248,.88);
  box-shadow:var(--shadow-soft);
}
.article h2 {
  margin:44px 0 16px;
  padding-bottom:10px;
  border-bottom:1px solid var(--line-soft);
  color:var(--ink);
  font-size:26px;
  font-weight:900;
  line-height:1.35;
  letter-spacing:-.025em;
}
.article h2:first-child { margin-top:0 }
.article h3 {
  margin:34px 0 12px;
  color:var(--ink);
  font-size:21px;
  font-weight:800;
}
.article h4 {
  margin:26px 0 10px;
  color:var(--ink);
  font-size:17px;
  font-weight:800;
}
.article p { margin:0 0 18px; color:var(--muted); line-height:1.86 }
.article ul,
.article ol { margin:0 0 20px; padding-left:26px; color:var(--muted) }
.article li { margin-bottom:7px }
.article li > ul,
.article li > ol { margin-bottom:0 }
.article hr { border:none; border-top:1px solid var(--line); margin:38px 0 }
.article code {
  border:1px solid #e6dac8;
  border-radius:8px;
  background:#f3eadb;
  padding:2px 6px;
  color:#3b2e20;
  font-family:"JetBrains Mono","Fira Code","Cascadia Code",Consolas,monospace;
  font-size:.9em;
}
.article pre {
  margin:0 0 22px;
  padding:18px 20px;
  overflow-x:auto;
  border:1px solid #e3d7c4;
  border-radius:var(--radius-md);
  background:#f4ecdf;
  font-size:14px;
  line-height:1.65;
}
.article pre code { border:none; background:transparent; padding:0; font-size:inherit }
.article blockquote {
  margin:0 0 24px;
  padding:16px 20px;
  border-left:4px solid var(--accent);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  background:rgba(223,241,236,.7);
  color:var(--muted);
}
.article blockquote p { margin:0; color:inherit }
.article blockquote p + p { margin-top:10px }
.article table {
  width:100%;
  margin:0 0 24px;
  border-collapse:collapse;
  font-size:14px;
}
.article th,
.article td {
  border:1px solid var(--line);
  padding:10px 14px;
  text-align:left;
  vertical-align:top;
}
.article th {
  background:var(--paper-strong);
  color:var(--ink);
  font-weight:800;
}
.article td { color:var(--muted) }
.article img {
  display:block;
  max-width:100%;
  margin:12px 0;
  border:1px solid var(--line);
  border-radius:var(--radius-md);
}
.post-actions {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin:26px auto 0;
}
.post-action-group {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.post-action {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  padding:0 14px;
  border:1px solid rgba(14,111,109,.18);
  border-radius:999px;
  background:rgba(255,253,248,.86);
  color:var(--accent-deep);
  box-shadow:0 8px 22px rgba(79,55,28,.08);
  cursor:pointer;
  font-size:14px;
  font-weight:900;
  text-decoration:none;
}
.post-action:hover {
  transform:translateY(-1px);
  background:var(--accent-soft);
  color:var(--accent-deep);
  text-decoration:none;
}
.post-action.secondary {
  border-color:var(--line);
  color:var(--muted);
}
.post-action.secondary:hover {
  color:var(--ink);
  background:#fffaf1;
}
.side-card,
.post-card {
  border:1px solid rgba(230,222,208,.9);
  background:rgba(255,253,248,.86);
  box-shadow:var(--shadow-soft);
}
.facet-chip,
.filter-pill button {
  border:none;
  cursor:pointer;
}
.content-grid {
  display:grid;
  grid-template-columns:220px minmax(0, 1fr);
  gap:22px;
  align-items:start;
  padding:28px 0 64px;
}
.sidebar {
  position:sticky;
  top:86px;
  display:grid;
  gap:16px;
}
.side-card {
  border-radius:18px;
  padding:14px;
}
.side-card h2 {
  margin:0 0 10px;
  color:var(--muted);
  font-size:15px;
  font-weight:900;
  letter-spacing:.02em;
}
.facet-chip {
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fffaf1;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}
.facet-chip:hover,
.facet-chip.active {
  border-color:rgba(14,111,109,.24);
  background:var(--accent-soft);
  color:var(--accent-deep);
}
.facet-chip span {
  color:var(--quiet);
  font-size:12px;
  font-weight:800;
}
.archive-stack {
  display:grid;
  gap:8px;
}
.archive-button {
  width:100%;
  justify-content:space-between;
  border-radius:14px;
}
.active-filters {
  min-height:31px;
  margin:0 0 14px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.filter-pill {
  padding:7px 9px 7px 12px;
  background:var(--amber-soft);
  color:#6d4113;
  border-color:rgba(175,107,26,.2);
}
.filter-pill button {
  width:18px;
  height:18px;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:rgba(109,65,19,.12);
  color:#6d4113;
  font-weight:900;
}
.month-section {
  margin:0 0 28px;
}
.month-title {
  margin:0 0 12px;
  display:flex;
  align-items:center;
  gap:12px;
  color:var(--muted);
  font-size:14px;
  font-weight:900;
  letter-spacing:.04em;
}
.month-title::after {
  content:"";
  height:1px;
  flex:1;
  background:var(--line);
}
.month-title span:last-child {
  color:var(--quiet);
  font-weight:800;
}
.post-list {
  display:grid;
  gap:14px;
}
.post-card {
  border-radius:var(--radius);
  padding:22px;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.post-card:hover {
  transform:translateY(-2px);
  border-color:rgba(14,111,109,.22);
  box-shadow:var(--shadow);
}
.post-meta {
  display:flex;
  flex-wrap:wrap;
  gap:9px;
  align-items:center;
  margin-bottom:10px;
  color:var(--quiet);
  font-size:13px;
  font-weight:800;
}
.dot::before {
  content:"";
  display:inline-block;
  width:4px;
  height:4px;
  margin:0 9px 2px 0;
  border-radius:999px;
  background:var(--line);
}
.post-title {
  display:inline;
  color:var(--ink);
  font-size:23px;
  font-weight:900;
  line-height:1.28;
  letter-spacing:-.025em;
  text-decoration:none;
}
.post-title:hover { color:var(--accent-deep); text-decoration:none }
.post-summary {
  margin:10px 0 0;
  color:var(--muted);
  line-height:1.75;
}
.post-tags {
  margin-top:14px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
mark {
  border-radius:5px;
  background:#ffe39b;
  color:inherit;
  padding:0 2px;
}
.empty {
  padding:56px 24px;
  border:1px dashed var(--line);
  border-radius:var(--radius);
  background:rgba(255,253,248,.68);
  color:var(--muted);
  text-align:center;
}
.empty strong {
  display:block;
  margin-bottom:6px;
  color:var(--ink);
  font-size:20px;
}
.empty[hidden] { display:none }
@media (max-width:900px) {
  .content-grid {
    grid-template-columns:1fr;
    padding-top:18px;
  }
  .sidebar {
    position:static;
  }
  .sidebar {
    display:block;
  }
  .archive-stack { display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; scrollbar-width:thin }
  .archive-button { width:auto; flex:0 0 auto }
}
@media (max-width:680px) {
  .nav { min-height:0; padding:10px 18px; gap:10px 14px; flex-wrap:wrap }
  .nav-search { order:3; flex-basis:100%; max-width:none; margin-left:0 }
  .home-shell,
  .wrap,
  .post-wrap { padding:0 18px }
  .content-grid { gap:14px; padding-top:14px }
  .side-card { margin:0 -2px; padding:12px; border-radius:16px }
  .side-card h2 { font-size:14px }
  .active-filters { min-height:0 }
  .post-card { padding:18px }
  .post-title { font-size:20px }
  .article { padding:24px 18px }
  .post-hero { padding:40px 0 26px }
}

</style>
</head>
